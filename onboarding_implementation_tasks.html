<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Implementation — Task List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #f8fafb;
      --c-surface: #ffffff;
      --c-border: #e5e7eb;
      --c-text: #1f2937;
      --c-text-secondary: #6b7280;
      --c-text-muted: #9ca3af;
      --c-primary: #2dbd8f;
      --c-primary-dark: #1e9e74;
      --c-primary-bg: #ecfdf5;
      --c-accent-blue: #3b82f6;
      --c-accent-blue-bg: #eff6ff;
      --c-accent-purple: #8b5cf6;
      --c-accent-purple-bg: #f5f3ff;
      --c-accent-amber: #f59e0b;
      --c-accent-amber-bg: #fffbeb;
      --c-accent-rose: #f43f5e;
      --c-accent-rose-bg: #fff1f2;
      --c-accent-cyan: #06b6d4;
      --c-accent-cyan-bg: #ecfeff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      padding: 32px 24px 80px;
      line-height: 1.5;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────── */
    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--c-text-secondary);
    }

    /* ── Progress Bar ───────────── */
    .progress-section {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .progress-header .label {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text);
    }

    .progress-header .count {
      font-size: 13px;
      color: var(--c-text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--c-primary), var(--c-primary-dark));
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .progress-stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--c-text-muted);
    }

    .progress-stats span { font-variant-numeric: tabular-nums; }
    .progress-stats .done { color: var(--c-primary); font-weight: 600; }

    /* ── Phase Groups ───────────── */
    .phase {
      margin-bottom: 24px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 4px;
      cursor: pointer;
      user-select: none;
    }

    .phase-header:hover .phase-title { color: var(--c-text); }

    .phase-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .phase-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--c-text);
      flex: 1;
      transition: color 0.15s;
    }

    .phase-count {
      font-size: 12px;
      color: var(--c-text-muted);
      font-weight: 500;
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }

    .phase-chevron {
      width: 18px;
      height: 18px;
      color: var(--c-text-muted);
      transition: transform 0.2s;
    }

    .phase.collapsed .phase-chevron { transform: rotate(-90deg); }
    .phase.collapsed .task-list { display: none; }

    /* ── Task List ──────────────── */
    .task-list {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.1s;
      cursor: pointer;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #fafbfc; }
    .task-item.done { opacity: 0.55; }
    .task-item.done .task-title { text-decoration: line-through; }

    /* Checkbox */
    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #d1d5db;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .task-check:hover { border-color: var(--c-primary); }

    .task-item.done .task-check {
      background: var(--c-primary);
      border-color: var(--c-primary);
    }

    .task-check svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s;
    }

    .task-item.done .task-check svg {
      opacity: 1;
      transform: scale(1);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--c-text);
      margin-bottom: 3px;
    }

    .task-meta {
      font-size: 12px;
      color: var(--c-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-tag {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .tag-new { background: var(--c-primary-bg); color: var(--c-primary-dark); }
    .tag-modify { background: var(--c-accent-blue-bg); color: var(--c-accent-blue); }
    .tag-backend { background: var(--c-accent-purple-bg); color: var(--c-accent-purple); }
    .tag-test { background: var(--c-accent-amber-bg); color: var(--c-accent-amber); }

    .task-file {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--c-text-muted);
      background: #f3f4f6;
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ── Footer ─────────────────── */
    .page-footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--c-border);
    }

    .page-footer p {
      font-size: 12px;
      color: var(--c-text-muted);
    }

    .btn-reset {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--c-border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--c-text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-reset:hover {
      background: #fff;
      border-color: #d1d5db;
      color: var(--c-text);
    }

    /* ── Animations ─────────────── */
    @keyframes check-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .task-check.pop { animation: check-pop 0.25s ease; }
  </style>
</head>
<body>
  <div class="container">

    <div class="page-header">
      <h1>Multi-Company Onboarding — Implementation Tasks</h1>
      <p>Interactive checklist for the LIFF onboarding feature. Progress is saved in your browser.</p>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="label">Overall Progress</span>
        <span class="count" id="progress-count">0 / 0 tasks</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-stats">
        <span class="done" id="stat-done">0 done</span>
        <span id="stat-remaining">0 remaining</span>
      </div>
    </div>

    <div id="phases-container"></div>

    <div class="page-footer">
      <p>Tasks are saved to localStorage automatically.</p>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset All Tasks
      </button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════
    // Task Data — based on implementation plan
    // ════════════════════════════════════════════════════
    const PHASES = [
      {
        id: 'types',
        title: 'Types & API Layer',
        icon: '🔷',
        color: 'var(--c-accent-blue)',
        colorBg: 'var(--c-accent-blue-bg)',
        tasks: [
          { id: 't1', title: 'Add OnboardingStep type', meta: 'company_verify | otp_verify | complete', tag: 'modify', file: 'types/index.ts' },
          { id: 't2', title: 'Add OnboardingState interface', meta: 'Step state with companyCode, employeeCode, lineUserId', tag: 'modify', file: 'types/index.ts' },
          { id: 't3', title: 'Add VerifyEmployeeRequest / Response interfaces', meta: 'Request: companyCode + employeeCode → Response: employeeId, nameTh, phoneMasked, companyName, companyId', tag: 'modify', file: 'types/index.ts' },
          { id: 't4', title: 'Add SendOtpRequest interface', meta: '{ employeeId: string }', tag: 'modify', file: 'types/index.ts' },
          { id: 't5', title: 'Add VerifyOtpRequest / Response interfaces', meta: 'Request: employeeId + otp + lineUserId → Response: success, authToken, companyId', tag: 'modify', file: 'types/index.ts' },
          { id: 't6', title: 'Add setCompanyId() and getCompanyId() to ApiClient', meta: 'Allow runtime company context update for multi-tenant', tag: 'modify', file: 'lib/api/client.ts' },
          { id: 't7', title: 'Update getApiClient() to read companyId from localStorage', meta: 'Fallback chain: localStorage → ENV variable', tag: 'modify', file: 'lib/api/client.ts' },
        ]
      },
      {
        id: 'component',
        title: 'Onboarding Component',
        icon: '🧩',
        color: 'var(--c-primary)',
        colorBg: 'var(--c-primary-bg)',
        tasks: [
          { id: 'c1', title: 'Create LiffOnboardingPage component', meta: 'New file — 3-step wizard with step state management', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c2', title: 'Implement Step 1: Company + Employee verification form', meta: 'Read ?company from URL params for QR auto-fill, POST /employees/verify', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c3', title: 'Implement Step 2: OTP verification form', meta: 'POST /auth/otp/send → display masked phone → POST /auth/otp/verify', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c4', title: 'Implement Step 3: Success summary + enter app', meta: 'Save companyId, employeeId, authToken to localStorage → call onComplete()', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c5', title: 'Add auto-fill badge UI for QR Code entries', meta: 'Show "กรอกอัตโนมัติจากป้ายโรงงาน" when ?company param present', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c6', title: 'Add OTP resend button with countdown timer', meta: '5 min expiry, disable resend until timer reaches 0', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
          { id: 'c7', title: 'Add back navigation from Step 2 → Step 1', meta: 'Clear OTP state and reset timer on back', tag: 'new', file: 'components/liff-onboarding-page.tsx' },
        ]
      },
      {
        id: 'auth-gate',
        title: 'Auth Gate Integration',
        icon: '🔐',
        color: 'var(--c-accent-amber)',
        colorBg: 'var(--c-accent-amber-bg)',
        tasks: [
          { id: 'a1', title: 'Replace linking form with LiffOnboardingPage', meta: 'When authState === "linking", render new component instead of old form', tag: 'modify', file: 'components/liff-auth-gate.tsx' },
          { id: 'a2', title: 'Update saveLinkedEmployee to include companyId', meta: 'saveLinkedEmployee(lineUserId, employeeId, companyId)', tag: 'modify', file: 'components/liff-auth-gate.tsx' },
          { id: 'a3', title: 'Add COMPANY_ID_STORAGE_KEY constant', meta: '"payday-company-id" → stored alongside employee links', tag: 'modify', file: 'components/liff-auth-gate.tsx' },
          { id: 'a4', title: 'Wire onComplete callback to update authState', meta: 'onComplete → saveLinkedEmployee() → setAuthState("ready")', tag: 'modify', file: 'components/liff-auth-gate.tsx' },
        ]
      },
      {
        id: 'backend',
        title: 'Backend API Endpoints (NestJS)',
        icon: '⚙️',
        color: 'var(--c-accent-purple)',
        colorBg: 'var(--c-accent-purple-bg)',
        tasks: [
          { id: 'b1', title: 'Implement POST /employees/verify endpoint', meta: 'Lookup by companyCode + employeeCode → return employeeId, nameTh, phoneMasked, companyName, companyId', tag: 'backend', file: 'payday-backend/' },
          { id: 'b2', title: 'Implement POST /auth/otp/send endpoint', meta: 'Generate 6-digit OTP, send SMS to employee phone, 5 min expiry', tag: 'backend', file: 'payday-backend/' },
          { id: 'b3', title: 'Implement POST /auth/otp/verify endpoint', meta: 'Verify OTP + save lineUserId to employee record → return JWT + companyId', tag: 'backend', file: 'payday-backend/' },
          { id: 'b4', title: 'Add rate limiting on OTP verify (max 5 attempts)', meta: 'Lock after 5 failed attempts, require resend to reset', tag: 'backend', file: 'payday-backend/' },
          { id: 'b5', title: 'Add Company Code field to companies table', meta: 'Short alphanumeric code (e.g. SMPC) as lookup key', tag: 'backend', file: 'payday-backend/' },
        ]
      },
      {
        id: 'server-links',
        title: 'Employee Links (Server-Side)',
        icon: '🔗',
        color: 'var(--c-accent-cyan)',
        colorBg: 'var(--c-accent-cyan-bg)',
        tasks: [
          { id: 's1', title: 'Create EmployeeLink interface with companyId', meta: '{ employeeId: string; companyId: string }', tag: 'modify', file: 'lib/line/employee-links.ts' },
          { id: 's2', title: 'Update serverLinks record type', meta: 'Record<string, EmployeeLink> instead of Record<string, string>', tag: 'modify', file: 'lib/line/employee-links.ts' },
          { id: 's3', title: 'Update linkEmployee() signature', meta: 'Add companyId parameter: linkEmployee(lineUserId, employeeId, companyId)', tag: 'modify', file: 'lib/line/employee-links.ts' },
          { id: 's4', title: 'Update getEmployeeIdByLineUserId() return', meta: 'Return EmployeeLink object or extract employeeId from new shape', tag: 'modify', file: 'lib/line/employee-links.ts' },
        ]
      },
      {
        id: 'i18n',
        title: 'Internationalization (i18n)',
        icon: '🌐',
        color: 'var(--c-accent-rose)',
        colorBg: 'var(--c-accent-rose-bg)',
        tasks: [
          { id: 'i1', title: 'Add onboarding namespace to th.json', meta: '19 keys — step titles, labels, buttons, errors', tag: 'modify', file: 'messages/th.json' },
          { id: 'i2', title: 'Add onboarding namespace to en.json', meta: '19 keys — English translations', tag: 'modify', file: 'messages/en.json' },
          { id: 'i3', title: 'Add onboarding namespace to my.json', meta: '19 keys — Myanmar translations', tag: 'modify', file: 'messages/my.json' },
        ]
      },
      {
        id: 'tests',
        title: 'Testing & Verification',
        icon: '✅',
        color: 'var(--c-accent-amber)',
        colorBg: 'var(--c-accent-amber-bg)',
        tasks: [
          { id: 'x1', title: 'Test: renders step 1 form with both inputs', meta: 'Company Code + Employee ID inputs + submit button present', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x2', title: 'Test: auto-fills company code from URL ?company=SMPC', meta: 'Input pre-filled + disabled when URL param exists', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x3', title: 'Test: shows auto-fill badge when company from QR', meta: '"กรอกอัตโนมัติจากป้ายโรงงาน" badge visible', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x4', title: 'Test: disables submit when inputs empty', meta: 'Button disabled until both fields have values', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x5', title: 'Test: shows error on 404 (employee not found)', meta: 'Mock API 404 → error message displayed', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x6', title: 'Test: transitions to step 2 on successful verify', meta: 'Mock API 200 → OTP step rendered', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x7', title: 'Test: displays masked phone in step 2', meta: 'Phone from API response shown correctly', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x8', title: 'Test: validates OTP is exactly 6 digits', meta: 'Submit enabled only at 6 characters', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x9', title: 'Test: shows error on invalid OTP (401)', meta: 'Mock API 401 → error displayed', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x10', title: 'Test: transitions to step 3 with summary on success', meta: 'Company, name, employee ID shown', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x11', title: 'Test: calls onComplete with companyId and employeeId', meta: 'Callback receives correct values', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x12', title: 'Test: saves companyId to localStorage', meta: 'Key "payday-company-id" written after completion', tag: 'test', file: 'components/liff-onboarding-page.test.tsx' },
          { id: 'x13', title: 'Test: auth gate renders LiffOnboardingPage when linking', meta: 'New component used instead of old form', tag: 'test', file: 'components/liff-auth-gate.test.tsx' },
          { id: 'x14', title: 'Test: auth gate passes lineProfile prop correctly', meta: 'Profile data forwarded to onboarding component', tag: 'test', file: 'components/liff-auth-gate.test.tsx' },
        ]
      },
    ];

    // ════════════════════════════════════════════════════
    // State Management (localStorage)
    // ════════════════════════════════════════════════════
    const STORAGE_KEY = 'onboarding-impl-tasks';
    const DEFAULT_TASK_STATE = {
      t1: true,
      t2: true,
      t3: true,
      t4: true,
      t5: true,
    };

    function loadState() {
      try {
        return { ...DEFAULT_TASK_STATE, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') };
      } catch { return { ...DEFAULT_TASK_STATE }; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let taskState = loadState();

    function isTaskDone(id) {
      return taskState[id] === true;
    }

    function toggleTask(id) {
      taskState[id] = !isTaskDone(id);
      saveState(taskState);
      renderAll();
    }

    function resetAll() {
      if (!confirm('Reset all tasks to unchecked?')) return;
      taskState = { ...DEFAULT_TASK_STATE };
      saveState(taskState);
      renderAll();
    }

    // ════════════════════════════════════════════════════
    // Rendering
    // ════════════════════════════════════════════════════
    function renderAll() {
      const container = document.getElementById('phases-container');
      container.innerHTML = '';

      let totalTasks = 0;
      let doneTasks = 0;

      PHASES.forEach(phase => {
        const phaseEl = document.createElement('div');
        phaseEl.className = 'phase';
        phaseEl.id = `phase-${phase.id}`;

        const phaseDone = phase.tasks.filter(t => isTaskDone(t.id)).length;
        const phaseTotal = phase.tasks.length;
        totalTasks += phaseTotal;
        doneTasks += phaseDone;

        phaseEl.innerHTML = `
          <div class="phase-header" onclick="togglePhase('${phase.id}')">
            <div class="phase-icon" style="background:${phase.colorBg};color:${phase.color};">${phase.icon}</div>
            <span class="phase-title">${phase.title}</span>
            <span class="phase-count">${phaseDone}/${phaseTotal}</span>
            <svg class="phase-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="task-list">
            ${phase.tasks.map(t => renderTask(t)).join('')}
          </div>
        `;

        container.appendChild(phaseEl);
      });

      // Update progress
      const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-count').textContent = `${doneTasks} / ${totalTasks} tasks`;
      document.getElementById('stat-done').textContent = `${doneTasks} done`;
      document.getElementById('stat-remaining').textContent = `${totalTasks - doneTasks} remaining`;
    }

    function renderTask(task) {
      const done = isTaskDone(task.id);
      const tagClass = `tag-${task.tag}`;
      const tagLabel = { new: 'NEW', modify: 'MODIFY', backend: 'BACKEND', test: 'TEST' }[task.tag] || task.tag.toUpperCase();

      return `
        <div class="task-item ${done ? 'done' : ''}" onclick="toggleTask('${task.id}')">
          <div class="task-check">
            <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 6l3 3 5-5"/>
            </svg>
          </div>
          <div class="task-body">
            <div class="task-title">${task.title}</div>
            <div class="task-meta">
              <span class="task-tag ${tagClass}">${tagLabel}</span>
              <span class="task-file">${task.file}</span>
              ${task.meta ? `<span style="color:var(--c-text-muted);font-size:11px;">— ${task.meta}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function togglePhase(phaseId) {
      const el = document.getElementById(`phase-${phaseId}`);
      el.classList.toggle('collapsed');
    }

    // ════════════════════════════════════════════════════
    // Init
    // ════════════════════════════════════════════════════
    renderAll();
  </script>
</body>
</html>
